<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReAct Math Agent — Ollama / Qwen3</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0b1120; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 8px var(--c)} 50%{box-shadow:0 0 24px var(--c)} }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>

<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useRef, useEffect, useCallback } = React;

/* ════════════════════════════════════════════════════════════════
 *  ReAct Math Agent — Ollama / Qwen3
 *  Visualises Thought → Action → Observation loops in real time
 * ════════════════════════════════════════════════════════════════ */

// ── Math Tools ──────────────────────────────────────────────────
const safeMathEval = (expr) => {
  try {
    const s = expr
      .replace(/\^/g, "**")
      .replace(/sqrt\(/gi, "Math.sqrt(")
      .replace(/cbrt\(/gi, "Math.cbrt(")
      .replace(/abs\(/gi, "Math.abs(")
      .replace(/sin\(/gi, "Math.sin(")
      .replace(/cos\(/gi, "Math.cos(")
      .replace(/tan\(/gi, "Math.tan(")
      .replace(/asin\(/gi, "Math.asin(")
      .replace(/acos\(/gi, "Math.acos(")
      .replace(/atan\(/gi, "Math.atan(")
      .replace(/log10\(/gi, "Math.log10(")
      .replace(/log2\(/gi, "Math.log2(")
      .replace(/log\(/gi, "Math.log10(")
      .replace(/ln\(/gi, "Math.log(")
      .replace(/exp\(/gi, "Math.exp(")
      .replace(/floor\(/gi, "Math.floor(")
      .replace(/ceil\(/gi, "Math.ceil(")
      .replace(/round\(/gi, "Math.round(")
      .replace(/min\(/gi, "Math.min(")
      .replace(/max\(/gi, "Math.max(")
      .replace(/\bpi\b/gi, "Math.PI")
      .replace(/\be\b/gi, "Math.E")
      .replace(/mod/gi, "%")
      .replace(/(\d+)!/g, (_, n) => {
        let r = 1; for (let i = 2; i <= +n; i++) r *= i; return r;
      });
    if (/[^0-9+\-*/().%,\s\w]/.test(s.replace(/Math\.\w+/g, ""))) {
      return { ok: false, error: "Unsafe expression" };
    }
    const result = new Function(`"use strict"; return (${s})`)();
    return { ok: true, result: Number(result) };
  } catch (e) {
    return { ok: false, error: e.message };
  }
};

const TOOL_DEFS = [
  {
    name: "calculate",
    desc: "Evaluate a mathematical expression. Supports +, -, *, /, ^, sqrt, sin, cos, tan, log, ln, exp, pi, e, factorial (!), abs, floor, ceil, round, min, max.",
    run: (input) => {
      const r = safeMathEval(input);
      return r.ok ? `${r.result}` : `Error: ${r.error}`;
    },
  },
  {
    name: "solve_quadratic",
    desc: "Solve ax²+bx+c=0. Input: a,b,c as comma-separated numbers.",
    run: (input) => {
      const parts = input.split(",").map((x) => parseFloat(x.trim()));
      if (parts.length !== 3 || parts.some(isNaN))
        return "Error: provide a,b,c as three comma-separated numbers";
      const [a, b, c] = parts;
      if (a === 0) return b === 0 ? (c === 0 ? "Infinite solutions" : "No solution") : `x = ${-c / b}`;
      const disc = b * b - 4 * a * c;
      if (disc < 0) {
        const real = (-b / (2 * a)).toFixed(6);
        const imag = (Math.sqrt(-disc) / (2 * a)).toFixed(6);
        return `x = ${real} ± ${imag}i (complex roots)`;
      }
      const x1 = ((-b + Math.sqrt(disc)) / (2 * a)).toFixed(6);
      const x2 = ((-b - Math.sqrt(disc)) / (2 * a)).toFixed(6);
      return x1 === x2 ? `x = ${x1} (double root)` : `x₁ = ${x1}, x₂ = ${x2}`;
    },
  },
  {
    name: "factor",
    desc: "Find prime factorization of a positive integer.",
    run: (input) => {
      let n = parseInt(input.trim());
      if (isNaN(n) || n < 2) return "Error: provide a positive integer >= 2";
      const factors = [];
      for (let d = 2; d * d <= n; d++) {
        while (n % d === 0) { factors.push(d); n /= d; }
      }
      if (n > 1) factors.push(n);
      return factors.join(" × ");
    },
  },
  {
    name: "gcd_lcm",
    desc: "Find GCD and LCM of two integers. Input: a,b as comma-separated.",
    run: (input) => {
      const parts = input.split(",").map((x) => parseInt(x.trim()));
      if (parts.length !== 2 || parts.some(isNaN)) return "Error: provide two comma-separated integers";
      let [a, b] = parts.map(Math.abs);
      const product = a * b;
      let [x, y] = [a, b];
      while (y) { [x, y] = [y, x % y]; }
      return `GCD(${a}, ${b}) = ${x}, LCM(${a}, ${b}) = ${product / x}`;
    },
  },
  {
    name: "statistics",
    desc: "Compute mean, median, std dev for a list of numbers. Input: comma-separated numbers.",
    run: (input) => {
      const nums = input.split(",").map((x) => parseFloat(x.trim())).filter((x) => !isNaN(x));
      if (!nums.length) return "Error: provide comma-separated numbers";
      const n = nums.length;
      const mean = nums.reduce((a, b) => a + b, 0) / n;
      const sorted = [...nums].sort((a, b) => a - b);
      const median = n % 2 ? sorted[Math.floor(n / 2)] : (sorted[n / 2 - 1] + sorted[n / 2]) / 2;
      const variance = nums.reduce((s, x) => s + (x - mean) ** 2, 0) / n;
      const stddev = Math.sqrt(variance);
      return `n=${n}, mean=${mean.toFixed(4)}, median=${median}, stddev=${stddev.toFixed(4)}`;
    },
  },
  {
    name: "convert_base",
    desc: "Convert a number between bases. Input: number, from_base, to_base (comma-separated). Example: 255,10,16",
    run: (input) => {
      const parts = input.split(",").map((s) => s.trim());
      if (parts.length !== 3) return "Error: provide number,from_base,to_base";
      const [numStr, fromStr, toStr] = parts;
      const from = parseInt(fromStr), to = parseInt(toStr);
      if (isNaN(from) || isNaN(to) || from < 2 || from > 36 || to < 2 || to > 36)
        return "Error: bases must be 2-36";
      const dec = parseInt(numStr, from);
      if (isNaN(dec)) return `Error: '${numStr}' is not valid in base ${from}`;
      return `${numStr} (base ${from}) = ${dec.toString(to).toUpperCase()} (base ${to})`;
    },
  },
];

const TOOL_LIST_FOR_PROMPT = TOOL_DEFS.map(
  (t) => `  - ${t.name}: ${t.desc}`
).join("\n");

// ── System Prompt ───────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a precise mathematics ReAct agent. You solve math problems step-by-step using a Thought/Action/Observation loop.

Available tools:
${TOOL_LIST_FOR_PROMPT}

IMPORTANT RULES:
1. You MUST follow this exact format for each step. Each step has a Thought, then an Action.
2. Format for using a tool:
Thought: <your reasoning about what to do next>
Action: tool_name(input)

3. After you receive an Observation (tool result), continue with another Thought/Action or give the final answer.
4. When you have the final answer, use:
Thought: <final reasoning>
Action: finish(your final answer here)

5. Be precise. Show your mathematical reasoning in Thoughts.
6. Use tools for computation — do NOT compute in your head.
7. Keep thoughts concise but clear.
8. Do NOT output Observation lines yourself — the system provides those.

/no_think`;

// ── Ollama call ─────────────────────────────────────────────────
const callOllama = async (messages, model, base, signal) => {
  const url = `${base.replace(/\/+$/, "")}/api/chat`;
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    signal,
    body: JSON.stringify({
      model,
      messages,
      stream: false,
      options: { temperature: 0, num_predict: 4096 },
    }),
  });
  if (!resp.ok) throw new Error(`Ollama ${resp.status}: ${await resp.text()}`);
  const data = await resp.json();
  return data.message?.content ?? "";
};

// ── Parse LLM output ────────────────────────────────────────────
const parseResponse = (text) => {
  const thoughts = [];
  const lines = text.split("\n");
  let currentThought = null;
  let currentAction = null;
  let collectingAction = false;

  for (const raw of lines) {
    const line = raw.trim();

    // Skip Observation lines the LLM generated itself (it shouldn't, but some models do)
    if (/^Observation:\s*/i.test(line)) {
      // If we were collecting an action, finalise it before skipping
      if (currentThought && currentAction) {
        thoughts.push({ thought: currentThought, action: currentAction });
        currentThought = null;
        currentAction = null;
        collectingAction = false;
      }
      continue;
    }

    if (/^Thought:\s*/i.test(line)) {
      if (currentThought && currentAction) {
        thoughts.push({ thought: currentThought, action: currentAction });
        currentAction = null;
        collectingAction = false;
      }
      currentThought = line.replace(/^Thought:\s*/i, "");
    } else if (/^Action:\s*/i.test(line)) {
      currentAction = line.replace(/^Action:\s*/i, "");
      collectingAction = true;
    } else if (collectingAction && currentAction) {
      // Continue collecting multi-line action content (e.g. finish with long output)
      currentAction += "\n" + line;
    } else if (currentThought && !currentAction) {
      currentThought += " " + line;
    }
  }
  if (currentThought && currentAction) {
    thoughts.push({ thought: currentThought, action: currentAction });
  }
  if (!thoughts.length && text.includes("(")) {
    const m = text.match(/(finish|calculate|solve_quadratic|factor|gcd_lcm|statistics|convert_base)\((.+)\)/is);
    if (m) thoughts.push({ thought: text.split(m[0])[0].replace(/^Thought:\s*/i, "").trim() || "(implicit reasoning)", action: `${m[1]}(${m[2]})` });
  }
  return thoughts;
};

const parseAction = (action) => {
  // Clean up: strip anything after closing paren on first complete call
  // This handles cases where the model appended extra text
  const cleaned = action.trim();
  // Match tool_name( ... ) — find the balanced closing paren
  const nameMatch = cleaned.match(/^(\w+)\(/);
  if (!nameMatch) return null;
  const toolName = nameMatch[1];
  // Find content between first ( and its matching )
  let depth = 0;
  let start = cleaned.indexOf("(");
  let end = -1;
  for (let i = start; i < cleaned.length; i++) {
    if (cleaned[i] === "(") depth++;
    if (cleaned[i] === ")") { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) {
    // No closing paren found — take everything after the opening paren
    return { tool: toolName.toLowerCase(), input: cleaned.slice(start + 1).trim().replace(/^["']|["']$/g, "") };
  }
  const input = cleaned.slice(start + 1, end).trim().replace(/^["']|["']$/g, "");
  return { tool: toolName.toLowerCase(), input };
};

// ── Stage types ─────────────────────────────────────────────────
const STAGE = { IDLE: "idle", THINKING: "thinking", RAW: "raw", THOUGHT: "thought", ACTION: "action", OBSERVATION: "observation", ANSWER: "answer", ERROR: "error" };
const STAGE_META = {
  [STAGE.IDLE]:        { label: "Idle",           color: "#475569", icon: "◇" },
  [STAGE.THINKING]:    { label: "LLM Generating", color: "#f59e0b", icon: "⟳" },
  [STAGE.RAW]:         { label: "LLM Raw Output", color: "#94a3b8", icon: "⎙" },
  [STAGE.THOUGHT]:     { label: "Thought",        color: "#3b82f6", icon: "◆" },
  [STAGE.ACTION]:      { label: "Action",         color: "#8b5cf6", icon: "▶" },
  [STAGE.OBSERVATION]: { label: "Observation",    color: "#10b981", icon: "◉" },
  [STAGE.ANSWER]:      { label: "Final Answer",   color: "#f43f5e", icon: "★" },
  [STAGE.ERROR]:       { label: "Error",          color: "#ef4444", icon: "✕" },
};

// ────────────────────────────────────────────────────────────────
//  LogEntry — collapsible for RAW output
// ────────────────────────────────────────────────────────────────
function LogEntry({ step, firstTs, mono }) {
  const [collapsed, setCollapsed] = useState(step.stage === STAGE.RAW);
  const meta = STAGE_META[step.stage];
  const isRaw = step.stage === STAGE.RAW;
  const preview = isRaw && step.text.length > 120 ? step.text.slice(0, 120) + "…" : step.text;

  return (
    <div style={{
      borderLeft: `3px solid ${meta.color}`, background: "#0f172a",
      borderRadius: "0 8px 8px 0", padding: "10px 14px",
      opacity: 0, animation: "slideUp .3s ease-out forwards",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, fontFamily: mono, letterSpacing: ".04em", background: meta.color + "22", color: meta.color }}>
            {meta.icon} {meta.label}
          </span>
          {isRaw && (
            <button
              onClick={() => setCollapsed(!collapsed)}
              style={{ background: "none", border: "1px solid #334155", borderRadius: 4, color: "#64748b", fontSize: 9, fontFamily: mono, padding: "1px 6px", cursor: "pointer", letterSpacing: ".04em" }}
            >
              {collapsed ? "▸ EXPAND" : "▾ COLLAPSE"} ({step.text.length} chars)
            </button>
          )}
        </div>
        <span style={{ fontSize: 10, color: "#475569", fontFamily: mono }}>+{((step.ts - firstTs) / 1000).toFixed(1)}s</span>
      </div>
      <pre style={{
        fontSize: isRaw ? 11 : 13,
        lineHeight: 1.55, color: isRaw ? "#64748b" : "#cbd5e1",
        fontFamily: mono, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0,
        maxHeight: collapsed ? 44 : "none", overflow: "hidden",
        transition: "max-height .3s ease",
      }}>{collapsed ? preview : step.text}</pre>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
//  Component
// ────────────────────────────────────────────────────────────────
function ReActMathAgent() {
  const [ollamaBase, setOllamaBase] = useState("http://localhost:11434");
  const [model, setModel] = useState("qwen3");
  const [availableModels, setAvailableModels] = useState([]);
  const [modelsLoading, setModelsLoading] = useState(false);
  const [modelsError, setModelsError] = useState(null);
  const [question, setQuestion] = useState("");
  const [running, setRunning] = useState(false);
  const [steps, setSteps] = useState([]);
  const [currentStage, setCurrentStage] = useState(STAGE.IDLE);
  const [finalAnswer, setFinalAnswer] = useState(null);
  const [error, setError] = useState(null);
  const [loopCount, setLoopCount] = useState(0);
  const abortRef = useRef(null);
  const scrollRef = useRef(null);
  const finishedRef = useRef(false);
  const MAX_LOOPS = 12;

  // Fetch available models from Ollama
  const fetchModels = useCallback(async (base) => {
    setModelsLoading(true);
    setModelsError(null);
    try {
      const url = `${base.replace(/\/+$/, "")}/api/tags`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`${resp.status}`);
      const data = await resp.json();
      const models = (data.models || []).map((m) => m.name).sort();
      setAvailableModels(models);
      // If current model isn't in list, select the first available
      if (models.length && !models.includes(model)) {
        // Check if there's a qwen3 variant, prefer that
        const qwen = models.find((m) => m.startsWith("qwen3"));
        setModel(qwen || models[0]);
      }
    } catch (e) {
      setModelsError(e.message);
      setAvailableModels([]);
    } finally {
      setModelsLoading(false);
    }
  }, [model]);

  // Fetch on mount
  useEffect(() => {
    fetchModels(ollamaBase);
  }, []);

  // Debounced fetch when URL changes
  const urlTimerRef = useRef(null);
  const handleBaseChange = useCallback((newBase) => {
    setOllamaBase(newBase);
    clearTimeout(urlTimerRef.current);
    urlTimerRef.current = setTimeout(() => fetchModels(newBase), 800);
  }, [fetchModels]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [steps]);

  const addStep = useCallback((stage, text) => {
    const entry = { stage, text, ts: Date.now() };
    setSteps((p) => [...p, entry]);
    setCurrentStage(stage);
    return entry;
  }, []);

  const runAgent = useCallback(async () => {
    if (!question.trim()) return;
    setRunning(true);
    setSteps([]);
    setFinalAnswer(null);
    setError(null);
    setLoopCount(0);
    setCurrentStage(STAGE.THINKING);
    finishedRef.current = false;

    const controller = new AbortController();
    abortRef.current = controller;

    const messages = [
      { role: "system", content: SYSTEM_PROMPT },
      { role: "user", content: question.trim() },
    ];

    let loops = 0;

    try {
      while (loops < MAX_LOOPS && !finishedRef.current) {
        loops++;
        setLoopCount(loops);

        addStep(STAGE.THINKING, `Calling ${model} (loop ${loops})…`);
        const raw = await callOllama(messages, model, ollamaBase, controller.signal);
        messages.push({ role: "assistant", content: raw });

        // Always show raw LLM output in trace
        addStep(STAGE.RAW, raw.trim() || "(empty response)");

        const parsed = parseResponse(raw);
        if (!parsed.length) {
          addStep(STAGE.ANSWER, raw.trim() || "(no parseable output)");
          setFinalAnswer(raw.trim() || "(no parseable output)");
          setCurrentStage(STAGE.ANSWER);
          break;
        }

        for (const step of parsed) {
          if (finishedRef.current) break;

          addStep(STAGE.THOUGHT, step.thought);
          await new Promise((r) => setTimeout(r, 300));

          const act = parseAction(step.action);
          if (!act) {
            addStep(STAGE.ERROR, `Could not parse action: ${step.action}`);
            continue;
          }

          if (act.tool === "finish") {
            addStep(STAGE.ANSWER, act.input);
            setFinalAnswer(act.input);
            setCurrentStage(STAGE.ANSWER);
            finishedRef.current = true;
            break;
          }

          addStep(STAGE.ACTION, `${act.tool}(${act.input})`);
          await new Promise((r) => setTimeout(r, 200));

          const toolDef = TOOL_DEFS.find((t) => t.name === act.tool);
          const observation = toolDef
            ? toolDef.run(act.input)
            : `Error: unknown tool "${act.tool}"`;

          addStep(STAGE.OBSERVATION, observation);

          messages.push({
            role: "user",
            content: `Observation: ${observation}`,
          });

          await new Promise((r) => setTimeout(r, 200));
        }
      }

      if (!finishedRef.current && loops >= MAX_LOOPS) {
        addStep(STAGE.ERROR, `Reached maximum loop count (${MAX_LOOPS})`);
        setCurrentStage(STAGE.ERROR);
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        const msg = e.message || String(e);
        addStep(STAGE.ERROR, msg);
        setError(msg);
        setCurrentStage(STAGE.ERROR);
      }
    } finally {
      setRunning(false);
    }
  }, [question, model, ollamaBase, addStep]);

  const handleStop = () => {
    abortRef.current?.abort();
    finishedRef.current = true;
    setRunning(false);
    setCurrentStage(STAGE.IDLE);
  };

  const pipelineStages = [STAGE.THINKING, STAGE.THOUGHT, STAGE.ACTION, STAGE.OBSERVATION, STAGE.ANSWER];

  const examples = [
    "What is the prime factorization of 2310?",
    "Solve x² - 5x + 6 = 0 then calculate the sum of the roots squared.",
    "What is the GCD of 462 and 1071? Then compute 462/GCD.",
    "Convert 255 to base 2, then find the square root of the result in decimal.",
    "Find the mean and standard deviation of 12, 15, 18, 22, 30, 35, 42",
  ];

  // ── Inline styles ─────────────────────────────────────────────
  const mono = "'JetBrains Mono', monospace";
  const sans = "'DM Sans', sans-serif";

  return (
    <div style={{ minHeight: "100vh", background: "#0b1120", color: "#e2e8f0", fontFamily: sans, display: "flex", flexDirection: "column" }}>

      {/* Header */}
      <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 24px", borderBottom: "1px solid #1e293b", background: "#0f172a", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 26, fontWeight: 700, color: "#3b82f6", fontFamily: mono }}>∑</span>
            <span style={{ fontSize: 16, fontWeight: 700, letterSpacing: "-.02em" }}>ReAct Math Agent</span>
          </div>
          <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: ".06em", padding: "3px 10px", borderRadius: 20, background: "#1e293b", color: "#94a3b8", fontFamily: mono }}>Ollama · {model}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <label style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: ".06em", fontFamily: mono }}>Ollama URL</label>
            <input
              style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, fontFamily: mono, outline: "none", width: 200 }}
              value={ollamaBase}
              onChange={(e) => handleBaseChange(e.target.value)}
              title="Base URL of your Ollama instance (uses /api/chat endpoint)"
              placeholder="http://localhost:11434"
            />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <label style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: ".06em", fontFamily: mono }}>Model</label>
            <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 4 }}>
              <select
                style={{ background: "#1e293b", border: `1px solid ${modelsError ? "#ef4444" : "#334155"}`, borderRadius: 6, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, fontFamily: mono, outline: "none", width: 260, cursor: "pointer" }}
                value={model}
                onChange={(e) => setModel(e.target.value)}
              >
                {availableModels.length === 0 && (
                  <option value={model}>{modelsLoading ? "Loading…" : model + (modelsError ? " (offline)" : "")}</option>
                )}
                {availableModels.map((m) => (
                  <option key={m} value={m}>{m}</option>
                ))}
              </select>
              <button
                onClick={() => fetchModels(ollamaBase)}
                disabled={modelsLoading}
                title="Refresh model list from Ollama"
                style={{
                  background: "#1e293b", border: "1px solid #334155", borderRadius: 6,
                  color: modelsLoading ? "#475569" : "#94a3b8", padding: "4px 8px",
                  cursor: modelsLoading ? "wait" : "pointer", fontSize: 14, lineHeight: 1,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}
              >
                <span style={{ display: "inline-block", animation: modelsLoading ? "spin 1s linear infinite" : "none" }}>↻</span>
              </button>
            </div>
            {modelsError && (
              <span style={{ fontSize: 9, color: "#ef4444", fontFamily: mono }}>Can't reach Ollama</span>
            )}
            {!modelsError && availableModels.length > 0 && (
              <span style={{ fontSize: 9, color: "#475569", fontFamily: mono }}>{availableModels.length} models</span>
            )}
          </div>
        </div>
      </header>

      {/* Ollama info bar */}
      <div style={{ padding: "6px 24px", background: "#0f172a", borderBottom: "1px solid #1e293b", display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 10, color: "#f59e0b", fontFamily: mono }}>ℹ</span>
        <span style={{ fontSize: 10, color: "#64748b", fontFamily: mono, lineHeight: 1.4 }}>
          Requires a local <a href="https://ollama.com" target="_blank" rel="noopener" style={{ color: "#94a3b8", textDecoration: "underline" }}>Ollama</a> instance
          with CORS enabled (<code style={{ color: "#94a3b8", background: "#1e293b", padding: "1px 4px", borderRadius: 3 }}>OLLAMA_ORIGINS=*</code>).
          Uses Ollama's <code style={{ color: "#94a3b8", background: "#1e293b", padding: "1px 4px", borderRadius: 3 }}>/api/chat</code> endpoint — not compatible with OpenAI, vLLM, or other API formats.
        </span>
      </div>

      {/* Pipeline Visualiser */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "10px 24px", background: "#0f172a88", borderBottom: "1px solid #1e293b", overflowX: "auto" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", fontFamily: mono, letterSpacing: ".08em", whiteSpace: "nowrap" }}>LOOP {loopCount || "—"}</div>
        <div style={{ display: "flex", alignItems: "center", flex: 1, justifyContent: "center" }}>
          {pipelineStages.map((s, i) => {
            const meta = STAGE_META[s];
            const isActive = currentStage === s;
            const isPast = pipelineStages.indexOf(currentStage) > i;
            const isFinal = s === STAGE.ANSWER && currentStage === STAGE.ANSWER;
            return (
              <div key={s} style={{ display: "flex", alignItems: "center" }}>
                {i > 0 && (
                  <div style={{ width: 48, height: 2, background: isPast || isActive ? meta.color : "#334155", transition: "background .4s" }} />
                )}
                <div style={{
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  padding: "8px 14px", borderRadius: 10, border: "1.5px solid", minWidth: 80,
                  fontFamily: mono,
                  "--c": meta.color,
                  borderColor: isActive || isPast || isFinal ? meta.color : "#334155",
                  background: isActive ? meta.color + "22" : isFinal ? meta.color + "33" : "transparent",
                  animation: isActive && !isFinal ? "glow 1.5s ease-in-out infinite" : "none",
                  transform: isActive ? "scale(1.12)" : "scale(1)",
                  transition: "all .3s",
                }}>
                  <span style={{ fontSize: 16 }}>{meta.icon}</span>
                  <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: ".05em", color: isActive || isPast ? meta.color : "#64748b" }}>
                    {meta.label.toUpperCase()}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", fontFamily: mono, letterSpacing: ".08em", whiteSpace: "nowrap" }}>MAX {MAX_LOOPS}</div>
      </div>

      <div style={{ display: "flex", flex: 1, minHeight: 0, overflow: "hidden" }}>
        {/* Left: Log */}
        <div style={{ flex: "1 1 50%", display: "flex", flexDirection: "column", borderRight: "1px solid #1e293b", minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 20px", background: "#0f172a", borderBottom: "1px solid #1e293b" }}>
            <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".06em", color: "#94a3b8", fontFamily: mono }}>Agent Trace</span>
            {running && <span style={{ fontSize: 10, fontWeight: 700, color: "#f43f5e", animation: "pulse 1.2s ease-in-out infinite", fontFamily: mono }}>● LIVE</span>}
          </div>
          <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
            {steps.length === 0 && !running && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 12, padding: 40 }}>
                <span style={{ fontSize: 40, opacity: 0.3 }}>∅</span>
                <p style={{ color: "#64748b", fontSize: 13 }}>Submit a math question to see the ReAct loop in action</p>
              </div>
            )}
            {steps.map((s, i) => (
              <LogEntry key={i} step={s} firstTs={steps[0]?.ts ?? s.ts} mono={mono} />
            ))}
            {running && (
              <div style={{ padding: "12px 16px", color: "#f59e0b", display: "flex", alignItems: "center", gap: 8, fontFamily: mono, fontSize: 12 }}>
                <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</span>
                Processing…
              </div>
            )}
          </div>
        </div>

        {/* Right: Input + Diagram */}
        <div style={{ flex: "1 1 50%", display: "flex", flexDirection: "column", padding: 20, gap: 16, overflowY: "auto" }}>
          {/* Diagram */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "16px 20px" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", fontFamily: mono, letterSpacing: ".08em", marginBottom: 8, textTransform: "uppercase" }}>ReAct Loop Architecture</div>
            <svg viewBox="0 0 420 260" style={{ width: "100%", maxWidth: 420 }}>
              <defs>
                <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                  <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
                </marker>
              </defs>
              <line x1="70" y1="50" x2="155" y2="50" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ah)" />
              <line x1="260" y1="50" x2="345" y2="50" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ah)" />
              <path d="M 370 70 L 370 140 L 345 140" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ah)" />
              <path d="M 235 140 L 210 140 L 210 70" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ah)" />
              <path d="M 370 70 L 370 210 L 260 210" fill="none" stroke="#475569" strokeWidth="1.5" strokeDasharray="4,3" markerEnd="url(#ah)" />
              <text x="175" y="112" fill="#64748b" fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle">loop</text>

              {[
                { x: 10, y: 30, w: 70, h: 40, label: "Question", color: "#94a3b8", stage: null },
                { x: 160, y: 30, w: 96, h: 40, label: "◆ Thought", color: "#3b82f6", stage: STAGE.THOUGHT },
                { x: 280, y: 30, w: 96, h: 40, label: "▶ Action", color: "#8b5cf6", stage: STAGE.ACTION },
                { x: 240, y: 120, w: 110, h: 40, label: "◉ Observe", color: "#10b981", stage: STAGE.OBSERVATION },
                { x: 160, y: 190, w: 96, h: 40, label: "★ Answer", color: "#f43f5e", stage: STAGE.ANSWER },
              ].map((n) => {
                const active = n.stage && currentStage === n.stage;
                return (
                  <g key={n.label}>
                    <rect x={n.x} y={n.y} width={n.w} height={n.h} rx={8}
                      fill={active ? n.color + "33" : "#1e293b"}
                      stroke={active ? n.color : "#334155"}
                      strokeWidth={active ? 2 : 1}
                    />
                    <text x={n.x + n.w / 2} y={n.y + n.h / 2 + 4}
                      fill={active ? n.color : "#94a3b8"}
                      fontSize="11" fontFamily="JetBrains Mono" fontWeight="500" textAnchor="middle"
                    >{n.label}</text>
                  </g>
                );
              })}

              <rect x="170" y="58" width="76" height="18" rx="4" fill="#0f172a" stroke="#f59e0b44" strokeWidth="1" />
              <text x="208" y="71" fill="#f59e0b" fontSize="8" fontFamily="JetBrains Mono" fontWeight="600" textAnchor="middle">LLM (Qwen3)</text>

              <rect x="335" y="86" width="70" height="18" rx="4" fill="#0f172a" stroke="#8b5cf644" strokeWidth="1" />
              <text x="370" y="99" fill="#8b5cf6" fontSize="8" fontFamily="JetBrains Mono" fontWeight="600" textAnchor="middle">Math Tools</text>
            </svg>
          </div>

          {/* Input */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: 16 }}>
            <textarea
              style={{ width: "100%", background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", padding: "10px 14px", fontSize: 14, fontFamily: sans, resize: "vertical", outline: "none", lineHeight: 1.5, minHeight: 60 }}
              rows={3}
              placeholder="Ask a math question…"
              value={question}
              onChange={(e) => setQuestion(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter" && !e.shiftKey && !running) { e.preventDefault(); runAgent(); }
              }}
            />
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10, gap: 8 }}>
              {running ? (
                <button onClick={handleStop} style={{ padding: "8px 20px", borderRadius: 8, border: "none", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: sans, background: "#dc2626", color: "#fff" }}>■ Stop</button>
              ) : (
                <button onClick={runAgent} disabled={!question.trim()} style={{ padding: "8px 20px", borderRadius: 8, border: "none", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: sans, background: "#3b82f6", color: "#fff", opacity: question.trim() ? 1 : 0.4, transition: "opacity .15s" }}>▶ Run Agent</button>
              )}
            </div>
          </div>

          {/* Final answer */}
          {finalAnswer && (
            <div style={{ background: "#0f172a", border: "1.5px solid #f43f5e", borderRadius: 12, padding: 16, animation: "slideUp .4s ease-out" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#f43f5e", fontFamily: mono, letterSpacing: ".08em", marginBottom: 8 }}>★ FINAL ANSWER</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0", lineHeight: 1.5, fontFamily: mono }}>{finalAnswer}</div>
            </div>
          )}

          {error && !finalAnswer && (
            <div style={{ background: "#0f172a", border: "1.5px solid #ef4444", borderRadius: 12, padding: 16, animation: "slideUp .4s ease-out" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#ef4444", fontFamily: mono, letterSpacing: ".08em", marginBottom: 8 }}>✕ ERROR</div>
              <div style={{ fontSize: 14, color: "#fca5a5", lineHeight: 1.5, fontFamily: mono }}>{error}</div>
            </div>
          )}

          {/* Examples */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", fontFamily: mono, letterSpacing: ".08em", marginBottom: 10, textTransform: "uppercase" }}>Try an example</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {examples.map((ex, i) => (
                <button key={i}
                  style={{ background: "transparent", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 12px", color: "#94a3b8", fontSize: 12, cursor: "pointer", fontFamily: mono, textAlign: "left", transition: "all .15s", lineHeight: 1.4 }}
                  onClick={() => { setQuestion(ex); setFinalAnswer(null); setSteps([]); setError(null); }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#3b82f6"; e.currentTarget.style.color = "#e2e8f0"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#1e293b"; e.currentTarget.style.color = "#94a3b8"; }}
                >{ex}</button>
              ))}
            </div>
          </div>

          {/* Tools */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", fontFamily: mono, letterSpacing: ".08em", marginBottom: 8, textTransform: "uppercase" }}>Available Tools</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {TOOL_DEFS.map((t) => (
                <span key={t.name} title={t.desc} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 6, padding: "3px 10px", fontSize: 11, color: "#94a3b8", fontFamily: mono }}>{t.name}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ReActMathAgent />);
</script>
</body>
</html>
